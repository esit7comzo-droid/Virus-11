name: Build EXE with Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Flask와 Pillow 추가 설치
        pip install pyinstaller requests flask pillow

    - name: Build EXE
      run: |
        # Flask용 templates 폴더와 이미지 파일을 모두 EXE에 포함
        pyinstaller --onefile --add-data "ghost_image.png;." --add-data "templates;templates" main.py
  
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: my_project_exe
        path: dist/main.exe
